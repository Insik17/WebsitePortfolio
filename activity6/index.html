<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax Apparel | Premium Dev-Wear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER SECTION -->
    <header>
        <div class="header-overlay">
            <span class="system-tag">v2.0 // STABLE RELEASE</span>
            <h1>SYNTAX APPAREL</h1>
            <p>High-Performance Gear for the Digital Architect</p>
        </div>
    </header>

    <!-- NAVIGATION -->
    <nav>
        <div class="nav-container">
            <div class="brand-small">S/A</div>
            <div class="menu">
                <a href="home.html" target="content-frame" class="nav-link active">DASHBOARD</a>
                <a href="products.html" target="content-frame" class="nav-link">COLLECTION</a>
                <a href="about.html" target="content-frame" class="nav-link">FOUNDATION</a>
            </div>
            <div class="cart-box">
                LOG: [ <span id="cart-count">0</span> ITEMS ]
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="viewport">
        <iframe src="home.html" name="content-frame" id="content-frame"></iframe>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-wrap">
            <p>&copy; 2026 SYNTAX APPAREL // MANUFACTURED IN THE PHILIPPINES</p>
            <p class="tech-sub">ENCRYPTED TRANSACTION SECURED</p>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script>
        // Navigation active state
        const links = document.querySelectorAll('.nav-link');
        links.forEach(link => {
            link.addEventListener('click', () => {
                links.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });

        // Cart counter
        let count = 0;
        window.addEventListener('message', (e) => {
            if (e.data === 'addItem') {
                count++;
                document.getElementById('cart-count').innerText = count;
            }
        });
    </script>
</body>
</html>
